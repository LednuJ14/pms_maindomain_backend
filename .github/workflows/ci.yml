name: CI

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Image Tag
        run: echo "IMAGE_TAG=prod-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          builder: ${{ steps.buildx.outputs.name }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pms-maindomain-backend:main
            ${{ secrets.DOCKERHUB_USERNAME }}/pms-maindomain-backend:${{ env.IMAGE_TAG }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/pms-maindomain-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/pms-maindomain-backend:buildcache,mode=max

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy Backend to Production via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: 22
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            echo "Logging into Docker Hub..."
            docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}

            echo "Navigating to backend deployment folder..."
            cd deployment-scripts/pms-maindomain/pms-maindomain-backend/

            echo "Creating .env.prod..."
            rm -f .env.prod
            touch .env.prod

            # DATABASE VARS - GENERAL MODULE
            echo "GENERAL_DB_HOST=${{ secrets.GENERAL_DB_HOST }}" >> .env.prod
            echo "GENERAL_DB_PORT=${{ secrets.GENERAL_DB_PORT }}" >> .env.prod
            echo "GENERAL_DB_USERNAME=${{ secrets.GENERAL_DB_USERNAME }}" >> .env.prod
            echo "GENERAL_DB_PASSWORD=${{ secrets.GENERAL_DB_PASSWORD }}" >> .env.prod
            echo "GENERAL_DB_DATABASE=${{ secrets.GENERAL_DB_DATABASE }}" >> .env.prod

            # JWT SECRETS
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env.prod
            echo "JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN }}" >> .env.prod

            # FIREBASE
            printf 'FIREBASE_SERVICE_ACCOUNT_JSON=%s\n' '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' >> .env.prod
            echo "FIREBASE_DATABASE_URL=${{ secrets.FIREBASE_DATABASE_URL }}" >> .env.prod

            # CI/CD Metadata
            echo "APP_VERSION=${{ env.IMAGE_TAG }}" >> .env.prod
            echo "BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> .env.prod

            chmod 600 .env.prod

            echo "Pulling latest backend image..."
            docker compose --env-file .env.prod pull pms-maindomain-backend

            echo "Deploying new backend container (zero downtime)..."
            docker compose --env-file .env.prod up -d --no-deps --force-recreate pms-maindomain-backend

            echo "Waiting for app startup..."
            sleep 12

            echo "Cleaning leftover Docker images..."
            docker image prune -af

            echo "✔ Backend deployed successfully!"
            docker compose logs --tail 50 pms-maindomain-backend
